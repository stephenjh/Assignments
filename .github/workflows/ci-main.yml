name: CI Main (Assignment 4)

on:
  push:
    branches:
      - main
    paths:
      - "assignment4/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "assignment4/**"
      - ".github/workflows/**"

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assignment4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mypy pylint

      - name: Run pytest
        run: pytest tests

      - name: Run mypy (relaxed scope)
        run: mypy app.py --ignore-missing-imports

      - name: Run pylint (relaxed rules)
        run: pylint app.py tests --disable=missing-module-docstring,missing-function-docstring,missing-class-docstring,too-few-public-methods,import-error
