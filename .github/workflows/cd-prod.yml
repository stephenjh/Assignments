name: CD Prod (Assignment 4)

on:
  push:
    branches:
      - prod
    paths:
      - "assignment4/**"
      - ".github/workflows/**"

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assignment4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mypy pylint

      - name: Run pytest
        run: pytest tests

      - name: Run mypy (relaxed scope)
        run: mypy app.py --ignore-missing-imports

      - name: Run pylint (relaxed rules)
        run: pylint app.py tests --disable=missing-module-docstring,missing-function-docstring,missing-class-docstring,too-few-public-methods,import-error

  build_and_push:
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      image_name: ${{ steps.image_name.outputs.image_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image_name
        run: |
          IMAGE="${{ vars.DOCKER_IMAGE }}"
          if [ -z "${IMAGE}" ]; then
            IMAGE="mleng-sayhi"
          fi
          echo "image_name=${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./assignment4
          push: true
          tags: |
            ${{ steps.image_name.outputs.image_name }}:latest
            ${{ steps.image_name.outputs.image_name }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - checks
      - build_and_push
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
          script: |
            docker pull ${{ needs.build_and_push.outputs.image_name }}:latest
            docker rm -f mleng-sayhi || true
            docker run --name mleng-sayhi --rm -v /opt/assignment_outputs:/app/data ${{ needs.build_and_push.outputs.image_name }}:latest
